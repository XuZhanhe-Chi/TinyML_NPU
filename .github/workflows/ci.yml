name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compiler:
    name: Compiler / Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sw/compiler/pyproject.toml
      - run: python -m pip install -e './sw/compiler[dev]'
      - run: make test-python PYTHON=python

  hardware:
    name: SpinalHDL, glue RTL, firmware and hygiene
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sudo apt-get update && sudo apt-get install -y iverilog
      - run: python -m pip install -e './sw/compiler[dev]'
      - run: make test-hw test-rtl test-firmware hygiene PYTHON=python
